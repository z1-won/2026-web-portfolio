upstream nextjs {
    server app:3000;
}

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name bangjiwon.com www.bangjiwon.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bangjiwon.com www.bangjiwon.com;

    ssl_certificate     /etc/letsencrypt/live/bangjiwon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bangjiwon.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Next.js 빌드 정적 파일 — 브라우저 캐시 1년
    location /_next/static/ {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # public/ 정적 파일
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=86400";
    }

    # 메인 프록시
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
